site_name: syntiq-mt5
site_description: Minimal, typed, and reliable MetaTrader 5 SDK for Python
site_url: https://lucifer516-sudoer.github.io/syntiq-mt5/
repo_url: https://github.com/lucifer516-sudoer/syntiq-mt5
repo_name: Lucifer516-sudoer/syntiq-mt5
copyright: Copyright &copy; 2024 Lucifer516-sudoer

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/favicon.ico
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    # Navigation
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - navigation.indexes
    # Search
    - search.highlight
    - search.suggest
    - search.share
    # Content
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    # TOC
    - toc.follow

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'
  - mkdocstrings:
      handlers:
        python:
          import:
            - https://docs.python.org/3/objects.inv
          paths: [src]
          options:
            docstring_style: google
            docstring_section_style: spacy
            show_root_heading: true
            show_root_full_path: false
            show_source: false
            members_order: source
            heading_level: 2
            show_signature_annotations: true
            separate_signature: true
            merge_init_into_class: true
            show_if_no_docstring: false
            filters:
              - "!^_"  # Exclude private members by default
            show_symbol_type_heading: true
            show_symbol_type_toc: true

markdown_extensions:
  # Admonitions
  - admonition
  - pymdownx.details
  # Code
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  # Tabs
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
  # Formatting
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  # Emoji
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  # Layout
  - tables
  - attr_list
  - md_in_html
  - def_list
  # Footnotes & abbreviations
  - footnotes
  - abbr
  - pymdownx.snippets
  # TOC
  - toc:
      permalink: true
      title: On this page

extra_css:
  - assets/custom.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/lucifer516-sudoer/syntiq-mt5
      name: syntiq-mt5 on GitHub
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/syntiq-mt5/
      name: syntiq-mt5 on PyPI

nav:
  - Home: index.md
  - 🚀 Quickstart: getting-started.md
  - 🧠 Core Concepts:
      - core/index.md
      - Lifecycle: core/lifecycle.md
      - Result[T]: core/results.md
      - Error Handling: core/error-handling.md
  - 📋 Tasks:
      - tasks/index.md
      - Get Positions: tasks/get-positions.md
      - Get Candles: tasks/get-candles.md
      - Place Orders: tasks/place-orders.md
      - Get Symbols: tasks/get-symbols.md
      - Get History: tasks/get-history.md
      - Get Ticks: tasks/get-ticks.md
      - Market Book: tasks/market-book.md
      - Get Account Info: tasks/get-account-info.md
      - Handle Errors: tasks/handle-errors.md
  - 📚 Reference:
      - reference/index.md
      - Constants: reference/constants.md
      - Models: reference/models.md
  - 🔌 API:
      - api/index.md
      - Client: api/client.md
      - Account: api/account.md
      - Positions: api/positions.md
      - Market: api/market.md
      - Orders: api/orders.md
      - History: api/history.md
      - Symbols: api/symbols.md
      - Ticks: api/ticks.md
      - Terminal: api/terminal.md
      - Market Book: api/market-book.md
      - Connection: api/connection.md
      - Core: api/core.md
